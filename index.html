                <div id="audio-controls">

                        aria-label="Play or pause background music"
                    >

                        <i
                            class="fas fa-pause"
                            id="pause-icon"
                            style="display: none"

                </div>

                <div class="footer-section">

                        <a
                            href="https://github.com/ibra-exe"
                            target="_blank"
                            rel="noopener"
                            aria-label="GitHub"
                            ><i class="fab fa-github"></i
                        ></a>
                        <a
                            href="https://www.linkedin.com/in/ibrahim-shaheen/"
                            target="_blank"
                            rel="noopener"
                            aria-label="LinkedIn"
                            ><i class="fab fa-linkedin"></i

                            target="_blank"
                            rel="noopener"
                            aria-label="X"
                            class="x-icon"

                        <i class="fas fa-robot"></i>
                    </div>
                </div>
            </div>

        </footer>

        <script>
            const frame = document.getElementById("contentFrame");

            function resizeFrame() {
                try {
                    const body = frame.contentDocument && frame.contentDocument.body;
                    if (body) {
                        frame.style.height = "0px";
                        frame.style.height = body.scrollHeight + "px";
                    }
                } catch(e) {}
            }

            function loadContent(page) {
                frame.src = page;
            }

            frame.addEventListener("load", function () {
                resizeFrame();
                try {
                    const observer = new ResizeObserver(resizeFrame);
                    observer.observe(frame.contentDocument.body);
                } catch(e) {}
            });

            document.addEventListener("DOMContentLoaded", function () {
                const audioPlayer = document.getElementById("audioPlayer");
                const audioToggle = document.getElementById("audio-toggle");
                const playIcon = document.getElementById("play-icon");
                const pauseIcon = document.getElementById("pause-icon");

                function updateAudioButton(isPlaying) {
                    if (isPlaying) {
                        playIcon.style.display = "none";
                        pauseIcon.style.display = "inline-block";
                    } else {
                        playIcon.style.display = "inline-block";
                        pauseIcon.style.display = "none";
                    }
                }

                // Click-to-play only: no autoplay attempt, no play-on-first-click
                // fallback. Music starts only via the footer play button.
                updateAudioButton(false);

                audioToggle.addEventListener("click", function () {
                    if (audioPlayer.paused) {
                        audioPlayer.play();
                        updateAudioButton(true);
                    } else {
                        audioPlayer.pause();
                        updateAudioButton(false);
                    }
                });

                audioPlayer.addEventListener("ended", () => updateAudioButton(false));
                audioPlayer.addEventListener("pause", () => updateAudioButton(false));
                audioPlayer.addEventListener("play", () => updateAudioButton(true));
            });
        </script>
    </body>
</html>
